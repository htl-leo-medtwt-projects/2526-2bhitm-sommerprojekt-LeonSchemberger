<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Dreams</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ---------------Start Screen--------------- -->
    <section id="start-menu">
        <div id="start-content">
            <div id="logo-start">
                <img src="img/UI Panels/Logo.png">
            </div>

            <div id="menu-btns">
                <button id="play-btn" onclick="createCharakter()">
                    <img src="img/Btns/PlayBtn.png">
                </button>
                <a href="html/info.html">
                    <button id="howto-btn">
                        <img src="img/Btns/HowToBtn.png">
                    </button>
                </a>
            </div>
        </div>
    </section>

    <!-- ---------------Create Charakter--------------- -->
    <section id="char-creator">
        <h1>Create your Player</h1>
        <div id="char-content">
            <div class="inputs">
                <input type="text" placeholder="Name..." id="player-name">
                <input type="number" placeholder="Alter..." id="player-age" readonly>

                <select id="team-select">
                    <option value="" disabled selected>Team wählen...</option>

                    <option value="haas">Haas F1 Team (Kostenlos)</option>
                    <option value="sauber">Audi (Kostenlos)</option>
                    <option value="williams">Williams (Kostenlos)</option>

                    <option value="cadillac" disabled>Cadillac - 250.000 €</option>
                    <option value="alpine" disabled>Alpine - 500.000 €</option>
                    <option value="rb" disabled>Racing Bulls - 750.000 €</option>
                    <option value="aston" disabled>Aston Martin - 1.200.000 €</option>
                    <option value="mercedes" disabled>Mercedes - 2.500.000 €</option>
                    <option value="mclaren" disabled>McLaren - 3.000.000 €</option>
                    <option value="ferrari" disabled>Ferrari - 4.500.000 €</option>
                    <option value="redbull" disabled>Red Bull Racing - 6.000.000 €</option>
                </select>
            </div>

            <div class="character-cards">
                <div id="char-card1" onclick="setAge(19)">
                    <img src="img/Looks/Look1-young.png" class="char-img">
                </div>
                <div id="char-card2" onclick="setAge(30)">
                    <img src="img/Looks/Look2-old.png" class="char-img">
                </div>
                <div id="char-card3" onclick="setAge(23)">
                    <img src="img/Looks/Look3-dark.png" class="char-img">
                </div>
            </div>

            <button id="save-btn" onclick="savePlayer()">
                <img src="img/Btns/SaveBtn.png">
            </button>
        </div>
    </section>

    <!-- ---------------Career Hub--------------- -->
    <section id="career-hub">

        <div id="hub-content">
            <div id="standings-window" class="box-style">
                <div class="panel-title">CHAMPIONSHIP STANDINGS</div>
                <div id="wm-tabelle">
                    <div class="drivers">
                        <!-- Fahrer irgendwie hinzufügen über JS -->
                    </div>
                </div>
            </div>

            <div id="hub-nav">
                <button class="hub-btn">
                    <img src="img/Btns/Übersicht.png">
                </button>
                <button class="hub-btn" onclick="raceCalendar()">
                    <img src="img/Btns/Rennkalender-inactive.png">
                </button>
            </div>

            <div id="info-box" class="box-style">
                <div id="next-race-box">
                    <div class="panel-title">NEXT RACE</div>
                    <div class="race-details">
                        <h3><!-- Streckennamen (gekoppelt mit Rennkalender im JS) --></h3>
                        <p><!-- Runden und Kilometeranzahl pro Runde --></p>
                        <img src="" class="track-map">
                    </div>
                </div>

                <div id="player-profile">
                    <div class="panel-title">DRIVER PROFILE</div>
                    <p id="money">Geld:</p>
                    <p id="player-money"><!-- Geld berechnen über JS --></p>
                </div>
            </div>
        </div>

        <button id="abreisen-btn" onclick="depart()">
            <img src="img/Btns/AbreisenBtn.png" alt="Abreisen">
        </button>
    </section>

    <!-- ---------------Race Calendar--------------- -->
    <section id="race-calendar">
        <div id="hub-nav">
            <button class="hub-btn" onclick="careerHub()">
                <img src="img/Btns/Übersicht-inactive.png">
            </button>
            <button class="hub-btn">
                <img src="img/Btns/Rennkalender-active.png">
            </button>
        </div>
    </section>


</body>

</html>
